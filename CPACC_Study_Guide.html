<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPACC Advanced Study Guide – IAAP</title>
  <meta name="description" content="Advanced study guide for the CPACC (Certified Professional in Accessibility Core Competencies) exam by IAAP. Covers all three domains at advanced level." />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" crossorigin="anonymous"></script>
  <style>
    /* ── CSS Custom Properties ── */
    :root {
      color-scheme: light dark;
      --bg:        #f8fafc;
      --surface:   #ffffff;
      --surface2:  #f1f5f9;
      --border:    #cbd5e1;
      --text:      #0f172a;
      --text-muted:#475569;
      --blue:      #1d4ed8;
      --blue-bg:   #eff6ff;
      --purple:    #7c3aed;
      --purple-bg: #f5f3ff;
      --teal:      #0891b2;
      --teal-bg:   #ecfeff;
      --amber:     #b45309;
      --amber-bg:  #fffbeb;
      --green:     #16a34a;
      --red:       #dc2626;
      --tip-bg:    #fffbeb;
      --tip-border:#fbbf24;
      --focus:     #2563eb;
      --nav-w:     280px;
      --header-h:  56px;
      --radius:    8px;
      --shadow:    0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.08);
    }
    [data-theme="dark"] {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --surface2:  #273548;
      --border:    #334155;
      --text:      #e2e8f0;
      --text-muted:#94a3b8;
      --blue:      #60a5fa;
      --blue-bg:   #172554;
      --purple:    #a78bfa;
      --purple-bg: #2d1f4e;
      --teal:      #22d3ee;
      --teal-bg:   #0c2d36;
      --amber:     #fbbf24;
      --amber-bg:  #2d1f00;
      --green:     #34d399;
      --red:       #f87171;
      --tip-bg:    #2d1f00;
      --tip-border:#fbbf24;
      --focus:     #60a5fa;
      --shadow:    0 1px 3px rgba(0,0,0,.4);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg:        #0f172a;
        --surface:   #1e293b;
        --surface2:  #273548;
        --border:    #334155;
        --text:      #e2e8f0;
        --text-muted:#94a3b8;
        --blue:      #60a5fa;
        --blue-bg:   #172554;
        --purple:    #a78bfa;
        --purple-bg: #2d1f4e;
        --teal:      #22d3ee;
        --teal-bg:   #0c2d36;
        --amber:     #fbbf24;
        --amber-bg:  #2d1f00;
        --green:     #34d399;
        --red:       #f87171;
        --tip-bg:    #2d1f00;
        --tip-border:#fbbf24;
        --focus:     #60a5fa;
        --shadow:    0 1px 3px rgba(0,0,0,.4);
      }
    }
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      background: var(--bg);
      color: var(--text);
      transition: background .2s, color .2s;
    }
    /* ── Skip Link ── */
    .skip-link {
      position: absolute;
      top: -9999px;
      left: 1rem;
      z-index: 9999;
      background: var(--focus);
      color: #fff;
      padding: .5rem 1rem;
      border-radius: var(--radius);
      font-weight: 600;
      text-decoration: none;
    }
    .skip-link:focus { top: .5rem; }
    /* ── Focus Visible ── */
    :focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }
    a { color: var(--blue); }
    a:hover { text-decoration: underline; }
    /* ── Header ── */
    .site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1.25rem;
      gap: 1rem;
      z-index: 200;
      box-shadow: var(--shadow);
    }
    .site-header h1 {
      font-size: 1rem;
      font-weight: 700;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--blue);
    }
    .header-badge {
      font-size: .7rem;
      font-weight: 600;
      background: var(--blue-bg);
      color: var(--blue);
      padding: .15rem .5rem;
      border-radius: 99px;
      border: 1px solid var(--blue);
      white-space: nowrap;
    }
    .theme-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: .35rem .8rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: .85rem;
      display: flex;
      align-items: center;
      gap: .4rem;
      white-space: nowrap;
      transition: background .15s;
    }
    .theme-btn:hover { background: var(--border); }
    .nav-toggle {
      display: none;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: .35rem .6rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 1.1rem;
    }
    /* ── Layout ── */
    .layout {
      display: flex;
      padding-top: var(--header-h);
      min-height: 100vh;
    }
    /* ── Sidebar ── */
    .sidebar {
      position: fixed;
      top: var(--header-h);
      left: 0;
      bottom: 0;
      width: var(--nav-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 1rem 0;
      z-index: 100;
      transition: transform .25s ease;
    }
    .sidebar.collapsed { transform: translateX(-100%); }
    .nav-section-label {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      padding: .75rem 1.25rem .25rem;
    }
    .nav-link {
      display: block;
      padding: .4rem 1.25rem;
      font-size: .875rem;
      color: var(--text-muted);
      text-decoration: none;
      border-left: 3px solid transparent;
      transition: color .15s, background .15s, border-color .15s;
    }
    .nav-link:hover { color: var(--text); background: var(--surface2); }
    .nav-link.active { color: var(--blue); border-left-color: var(--blue); background: var(--blue-bg); font-weight: 600; }
    .nav-domain {
      display: block;
      padding: .5rem 1.25rem;
      font-size: .8rem;
      font-weight: 700;
      text-decoration: none;
      border-left: 3px solid transparent;
      transition: color .15s, background .15s;
    }
    .nav-domain.d1 { color: var(--purple); }
    .nav-domain.d1:hover, .nav-domain.d1.active { background: var(--purple-bg); border-left-color: var(--purple); }
    .nav-domain.d2 { color: var(--teal); }
    .nav-domain.d2:hover, .nav-domain.d2.active { background: var(--teal-bg); border-left-color: var(--teal); }
    .nav-domain.d3 { color: var(--amber); }
    .nav-domain.d3:hover, .nav-domain.d3.active { background: var(--amber-bg); border-left-color: var(--amber); }
    /* ── Main Content ── */
    .main-content {
      flex: 1;
      margin-left: var(--nav-w);
      padding: 2rem 2.5rem 4rem;
      max-width: 1100px;
    }
    /* ── Sections ── */
    .section-anchor { scroll-margin-top: calc(var(--header-h) + 1.5rem); }
    /* ── Domain Headers ── */
    .domain-header {
      padding: 1.5rem;
      border-radius: var(--radius);
      margin-bottom: 2rem;
    }
    .domain-header.d1 { background: var(--purple-bg); border-left: 5px solid var(--purple); }
    .domain-header.d2 { background: var(--teal-bg); border-left: 5px solid var(--teal); }
    .domain-header.d3 { background: var(--amber-bg); border-left: 5px solid var(--amber); }
    .domain-header h2 { font-size: 1.4rem; margin-bottom: .4rem; }
    .domain-header.d1 h2 { color: var(--purple); }
    .domain-header.d2 h2 { color: var(--teal); }
    .domain-header.d3 h2 { color: var(--amber); }
    .domain-header p { color: var(--text-muted); font-size: .95rem; }
    .domain-badge {
      display: inline-block;
      font-size: .7rem;
      font-weight: 700;
      padding: .15rem .5rem;
      border-radius: 99px;
      margin-bottom: .5rem;
    }
    .d1 .domain-badge { background: var(--purple); color: #fff; }
    .d2 .domain-badge { background: var(--teal); color: #0f172a; }
    .d3 .domain-badge { background: var(--amber); color: #0f172a; }
    /* ── Section Headings ── */
    .section-h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 2rem 0 .5rem;
      padding-bottom: .4rem;
      border-bottom: 2px solid var(--border);
      color: var(--text);
    }
    .section-intro { color: var(--text-muted); margin-bottom: 1rem; font-size: .95rem; }
    /* ── Term Tables ── */
    .term-table-wrap { overflow-x: auto; margin: 1rem 0 1.5rem; border-radius: var(--radius); border: 1px solid var(--border); }
    .term-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .9rem;
    }
    .term-table th {
      background: var(--surface2);
      padding: .6rem 1rem;
      text-align: left;
      font-weight: 700;
      color: var(--text-muted);
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      border-bottom: 2px solid var(--border);
    }
    .term-table td {
      padding: .7rem 1rem;
      vertical-align: top;
      border-bottom: 1px solid var(--border);
      line-height: 1.5;
    }
    .term-table tr:last-child td { border-bottom: none; }
    .term-table tr:nth-child(even) td { background: var(--surface2); }
    .term-col { font-weight: 700; white-space: nowrap; min-width: 160px; }
    .term-col.d1 { color: var(--purple); }
    .term-col.d2 { color: var(--teal); }
    .term-col.d3 { color: var(--amber); }
    /* ── SC Table ── */
    .sc-table-wrap { overflow-x: auto; margin: 1rem 0 1.5rem; border-radius: var(--radius); border: 1px solid var(--border); }
    .sc-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    .sc-table th {
      background: var(--surface2);
      padding: .5rem .75rem;
      text-align: left;
      font-weight: 700;
      color: var(--text-muted);
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      border-bottom: 2px solid var(--border);
    }
    .sc-table td {
      padding: .55rem .75rem;
      vertical-align: top;
      border-bottom: 1px solid var(--border);
      line-height: 1.45;
    }
    .sc-table tr:last-child td { border-bottom: none; }
    .sc-table tr:nth-child(even) td { background: var(--surface2); }
    .sc-num { font-weight: 700; color: var(--teal); white-space: nowrap; }
    .level-a  { background: #16a34a; color: #fff; font-size: .7rem; font-weight: 700; padding: .1rem .4rem; border-radius: 4px; white-space: nowrap; }
    .level-aa { background: var(--teal); color: #0f172a; font-size: .7rem; font-weight: 700; padding: .1rem .4rem; border-radius: 4px; white-space: nowrap; }
    .level-aaa{ background: var(--amber); color: #0f172a; font-size: .7rem; font-weight: 700; padding: .1rem .4rem; border-radius: 4px; white-space: nowrap; }
    /* ── Tip Box ── */
    .tip-box {
      background: var(--tip-bg);
      border: 1px solid var(--tip-border);
      border-left: 4px solid var(--tip-border);
      border-radius: var(--radius);
      padding: .85rem 1.1rem;
      margin: 1rem 0 1.5rem;
      font-size: .9rem;
    }
    .tip-label { font-weight: 700; color: var(--amber); }
    /* ── Cover ── */
    .cover {
      text-align: center;
      padding: 3rem 1rem 2rem;
      margin-bottom: 2rem;
    }
    .cover-title { font-size: 2.5rem; font-weight: 800; color: var(--blue); letter-spacing: -.02em; }
    .cover-sub { font-size: 1.2rem; color: var(--text-muted); margin: .4rem 0 2rem; }
    .domain-cards { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .domain-card {
      flex: 1; min-width: 180px; max-width: 240px;
      padding: 1rem 1.25rem;
      border-radius: var(--radius);
      text-align: center;
      border: 2px solid;
    }
    .domain-card.d1 { background: var(--purple-bg); border-color: var(--purple); }
    .domain-card.d2 { background: var(--teal-bg); border-color: var(--teal); }
    .domain-card.d3 { background: var(--amber-bg); border-color: var(--amber); }
    .domain-card-title { font-weight: 700; font-size: .9rem; }
    .d1 .domain-card-title { color: var(--purple); }
    .d2 .domain-card-title { color: var(--teal); }
    .d3 .domain-card-title { color: var(--amber); }
    .domain-card-sub { font-size: .8rem; color: var(--text-muted); margin-top: .25rem; }
    /* ── Law Table ── */
    .law-table-wrap { overflow-x: auto; margin: 1rem 0 1.5rem; border-radius: var(--radius); border: 1px solid var(--border); }
    .law-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    .law-table th {
      background: var(--amber-bg);
      padding: .5rem .75rem;
      text-align: left;
      font-weight: 700;
      color: var(--amber);
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      border-bottom: 2px solid var(--amber);
    }
    .law-table td { padding: .55rem .75rem; vertical-align: top; border-bottom: 1px solid var(--border); line-height: 1.45; }
    .law-table tr:last-child td { border-bottom: none; }
    .law-table tr:nth-child(even) td { background: var(--surface2); }
    .juris-col { font-weight: 700; color: var(--amber); white-space: nowrap; }
    /* ── Responsive ── */
    @media (max-width: 900px) {
      .main-content { margin-left: 0; padding: 1.5rem 1.25rem 3rem; }
      .nav-toggle { display: flex; }
      .sidebar { transform: translateX(-100%); box-shadow: 4px 0 12px rgba(0,0,0,.15); }
      .sidebar.open { transform: translateX(0); }
      .cover-title { font-size: 1.8rem; }
    }
    @media (max-width: 540px) {
      .main-content { padding: 1rem .9rem 3rem; }
      .term-table td, .sc-table td { padding: .5rem .65rem; }
      .domain-cards { flex-direction: column; align-items: stretch; }
      .domain-card { max-width: 100%; }
    }
    /* ── Print ── */
    @media print {
      .site-header, .sidebar, .theme-btn, .nav-toggle, .skip-link { display: none !important; }
      .main-content { margin-left: 0; padding: 0; }
      .domain-header, .tip-box { break-inside: avoid; }
      .term-table-wrap, .sc-table-wrap { break-inside: avoid; }
    }
    /* ── Overlay for mobile nav ── */
    .nav-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 90;
    }
    .nav-overlay.active { display: block; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── DATA ─────────────────────────────────────────────────── */
    const NAV = [
      { id:"cover",   label:"Overview",        cls:"" },
      { id:"d1",      label:"Domain I",        cls:"nav-domain d1" },
      { id:"s1-1",    label:"1.1 Disability Models",  cls:"nav-link" },
      { id:"s1-2",    label:"1.2 Visual Disabilities", cls:"nav-link" },
      { id:"s1-3",    label:"1.3 Auditory Disabilities",cls:"nav-link" },
      { id:"s1-4",    label:"1.4 Motor Disabilities",  cls:"nav-link" },
      { id:"s1-5",    label:"1.5 Cognitive Disabilities",cls:"nav-link" },
      { id:"s1-6",    label:"1.6 Speech & DeafBlind",  cls:"nav-link" },
      { id:"d2",      label:"Domain II",       cls:"nav-domain d2" },
      { id:"s2-1",    label:"2.1 WCAG Overview",       cls:"nav-link" },
      { id:"s2-2",    label:"2.2 WCAG Success Criteria",cls:"nav-link" },
      { id:"s2-3",    label:"2.3 WAI-ARIA",            cls:"nav-link" },
      { id:"s2-4",    label:"2.4 Universal Design",    cls:"nav-link" },
      { id:"s2-5",    label:"2.5 Web Techniques",      cls:"nav-link" },
      { id:"d3",      label:"Domain III",      cls:"nav-domain d3" },
      { id:"s3-1",    label:"3.1 US Laws",             cls:"nav-link" },
      { id:"s3-2",    label:"3.2 International Laws",  cls:"nav-link" },
      { id:"s3-3",    label:"3.3 Standards & Testing", cls:"nav-link" },
      { id:"s3-4",    label:"3.4 Org Management",      cls:"nav-link" },
      { id:"s3-5",    label:"3.5 Laws Quick Ref",      cls:"nav-link" },
    ];

    const D1_MODELS = [
      ["Medical Model","Views disability as a pathological condition residing in the individual. Rehabilitation, treatment, and cure are the primary goals. Criticized for marginalizing the role of environment and societal barriers. Historically dominant in clinical and legal frameworks."],
      ["Social Model","Developed by UPIAS (UK) in 1975; distinguished between 'impairment' (physical/mental difference) and 'disability' (social barriers). Disability is caused by society, not the body. Empowers political advocacy but criticized for undervaluing medical needs."],
      ["Biopsychosocial Model","Underlies the WHO's ICF (International Classification of Functioning, Disability and Health). Integrates body functions, activities, participation, environmental factors, and personal factors. ICF replaced ICIDH in 2001. Most holistic for policy and assessment."],
      ["Functional Model","Focuses on practical functional limitations — what a person cannot do — without assigning blame to individual or society. Used in vocational rehabilitation and product design. Less politically charged than Social Model but can ignore systemic barriers."],
      ["Charity Model","Views disabled people as objects of pity deserving charity. Prevalent in fundraising and public awareness campaigns. Criticized for reinforcing dependency and paternalism. Often portrays disability as tragedy."],
      ["Cultural/Identity Model","Particularly evident in Deaf culture. Disability is not a deficiency but a cultural and social identity. Deaf culture rejects hearing-centric 'cures' (e.g., cochlear implants). Also visible in disability pride and neurodiversity movements."],
      ["Affirmative Model","Builds on Social Model; asserts that disability can be a positive identity. Focuses on strengths and contributions of disabled people. Associated with disability arts and rights movements. Goes further than Social Model by valuing difference positively."],
      ["Economic Model","Defines disability through the lens of productivity and employability. Emphasizes inability to participate in the labor market. Informs many government benefit systems. Criticized for reducing persons to their economic output."],
    ];
    const D1_VISUAL = [
      ["Blindness","Absence or near-absence of functional vision. Primary AT: screen readers (NVDA, JAWS, VoiceOver, TalkBack, Narrator). Navigation via keyboard, braille display, or switch access. Screen readers linearize content, so visual layout must be conveyed through semantic HTML and ARIA."],
      ["Low Vision","Partial vision that cannot be fully corrected with lenses. AT includes: screen magnification software (ZoomText, Magnifier), high-contrast display modes, large-print materials. Designs must support browser zoom up to 400% without loss of function (WCAG 1.4.4 Resize Text)."],
      ["Color Blindness","Affects ~8% of males and 0.5% of females. Most common: red-green (deuteranopia, protanopia). Designs must not rely solely on color to convey information (WCAG 1.4.1 Use of Color). Provide patterns, labels, or shapes as supplementary cues."],
      ["Photosensitive Epilepsy","Seizures triggered by flashing content. WCAG 2.3.1 (A) prohibits content flashing more than 3 times/second. WCAG 2.3.2 (AAA) allows any animation to be paused. The 'three flashes' threshold is measured against the General Flash and Red Flash Thresholds."],
      ["Contrast Sensitivity Loss","Difficulty distinguishing elements with low contrast, common in aging. WCAG 1.4.3 (AA) requires 4.5:1 for normal text and 3:1 for large text (18pt+ or 14pt+ bold). WCAG 1.4.11 (AA) requires 3:1 for UI components and graphical objects."],
      ["Screen Readers","Software that converts text and UI to speech/braille. Order of navigation follows DOM order. Require proper heading hierarchy, alt text, form labels, ARIA landmarks, skip links, and focus management. VoiceOver (Apple), JAWS (Windows), NVDA (Windows, free), TalkBack (Android)."],
      ["Refreshable Braille Displays","Hardware devices with motorized pins that render braille characters from screen reader output. Typically 40 or 80 cells wide. Used by DeafBlind users and those who prefer tactile reading. Require screen reader compatibility."],
    ];
    const D1_AUDITORY = [
      ["Deafness","Profound hearing loss. Primary barrier: audio content without visual equivalent. Solutions: captions for live/recorded media, full transcripts, sign language video. Many Deaf users have English as a second language (with ASL/BSL as primary)."],
      ["Hard of Hearing","Partial hearing loss; may use hearing aids or cochlear implants. May benefit from captions (especially in noisy environments), amplified sound, written alternatives. Hearing aids amplify all sound, so noise reduction is important."],
      ["Closed Captions (CC)","Time-synchronized text of spoken dialogue and important sound effects. Required for pre-recorded video (WCAG 1.2.2, Level A). Live captions required at AA (1.2.4). Distinguished from open captions (always on) and subtitles (translation only, no sound effects)."],
      ["CART","Communication Access Realtime Translation. A trained stenographer types speech verbatim in real time. Provides near word-for-word captions. Higher accuracy than automated captions (ASR) for complex technical or legal content. Often used in live conferences and classrooms."],
      ["Audio Description (AD)","Narration added to video during pauses to describe visual information (actions, settings, expressions) not conveyed by dialogue. Required for prerecorded video at WCAG 1.2.5 (AA). Extended AD (1.2.7, AAA) adds pauses for more description. Critical for blind users."],
      ["Sign Language Interpretation","ASL (American), BSL (British), and others. WCAG 1.2.6 (AAA) recommends sign language for prerecorded audio. Culturally preferred by many Deaf individuals over captions since ASL has different grammar from English."],
      ["Cochlear Implants","Surgical device that bypasses damaged hair cells and directly stimulates the auditory nerve. Controversial in Deaf culture. Unlike hearing aids, provides a digital representation of sound. Not restoration of natural hearing; users still often benefit from captions."],
    ];
    const D1_MOTOR = [

      ["Canada","Accessible Canada Act","Federal regulated entities","Accessibility Standards Canada"],

      ["International","UN CRPD","Signatory nations (rights treaty)","No specific ICT standard"],
      ["Australia","DDA (1992)","Service providers","WCAG 2.1 AA (guidance)"],
    ];

    /* ── COMPONENTS ───────────────────────────────────────────── */

    function TermTable({ rows, domain = "d1" }) {
      return (
        <div className="term-table-wrap" role="region" aria-label="Key terms table">
          <table className="term-table">
            <thead>
              <tr>
                <th scope="col" style={{width:"200px"}}>Term / Concept</th>
                <th scope="col">Advanced Definition</th>
              </tr>
            </thead>
            <tbody>
              {rows.map(([term, def]) => (
                <tr key={term}>
                  <td className={`term-col ${domain}`}>{term}</td>
                  <td>{def}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function SCTable() {
      const levelBadge = (l) => {
        const cls = l === "A" ? "level-a" : l === "AA" ? "level-aa" : "level-aaa";
        return <span className={cls} aria-label={`Level ${l}`}>{l}</span>;
      };
      return (
        <div className="sc-table-wrap" role="region" aria-label="WCAG Success Criteria reference table">
          <table className="sc-table">
            <caption className="sr-only">WCAG 2.x Success Criteria — Advanced Reference</caption>
            <thead>
              <tr>
                <th scope="col">SC</th>
                <th scope="col">Level</th>
                <th scope="col">Requirement</th>
                <th scope="col">Key Detail</th>
              </tr>
            </thead>
            <tbody>
              {SC_DATA.map(([sc, lvl, req, detail]) => (
                <tr key={sc}>
                  <td className="sc-num">{sc}</td>
                  <td>{levelBadge(lvl)}</td>
                  <td><strong>{req}</strong></td>
                  <td style={{color:"var(--text-muted)"}}>{detail}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function TipBox({ label, children }) {
      return (
        <aside className="tip-box" aria-label={label}>
          <span className="tip-label">{label}: </span>{children}
        </aside>
      );
    }

    function SectionHeading({ id, children }) {
      return <h3 id={id} className="section-h3 section-anchor">{children}</h3>;
    }

    /* ── APP ──────────────────────────────────────────────────── */
    function App() {
      // Theme: detect system preference, allow manual override
      const getInitialTheme = () => {
        try {
          const saved = localStorage.getItem("cpacc-theme");
          if (saved) return saved;
        } catch {}
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      };

      const [theme, setTheme] = useState(getInitialTheme);
      const [navOpen, setNavOpen] = useState(false);
      const [activeSection, setActiveSection] = useState("cover");
      const announcerRef = useRef(null);

      useEffect(() => {
        document.documentElement.setAttribute("data-theme", theme);
        try { localStorage.setItem("cpacc-theme", theme); } catch {}
        if (announcerRef.current) {
          announcerRef.current.textContent = `${theme === "dark" ? "Dark" : "Light"} mode activated`;
        }
      }, [theme]);

      // Listen for system theme changes
      useEffect(() => {
        const mq = window.matchMedia("(prefers-color-scheme: dark)");
        const handler = (e) => {
          try {
            if (!localStorage.getItem("cpacc-theme")) {
              setTheme(e.matches ? "dark" : "light");
            }
          } catch {
            setTheme(e.matches ? "dark" : "light");
          }
        };
        mq.addEventListener("change", handler);
        return () => mq.removeEventListener("change", handler);
      }, []);

      // Intersection Observer for active nav item
      useEffect(() => {
        const ids = NAV.map(n => n.id);
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) setActiveSection(entry.target.id);
            });
          },
          { rootMargin: `-${56 + 24}px 0px -60% 0px`, threshold: 0 }
        );
        ids.forEach(id => {
          const el = document.getElementById(id);
          if (el) observer.observe(el);
        });
        return () => observer.disconnect();
      }, []);

      const toggleTheme = () => setTheme(t => t === "dark" ? "light" : "dark");
      const closeNav = () => setNavOpen(false);

      return (
        <>
          {/* Skip link */}
          <a href="#main-content" className="skip-link">Skip to main content</a>

          {/* Live region for theme announcements */}
          <div
            ref={announcerRef}
            aria-live="polite"
            aria-atomic="true"
            style={{position:"absolute",width:"1px",height:"1px",overflow:"hidden",clip:"rect(0,0,0,0)",whiteSpace:"nowrap"}}
          />

          {/* Header */}
          <header className="site-header" role="banner">
            <button
              className="nav-toggle"
              aria-label={navOpen ? "Close navigation menu" : "Open navigation menu"}
              aria-expanded={navOpen}
              aria-controls="sidebar-nav"
              onClick={() => setNavOpen(o => !o)}
            >
              {navOpen ? "✕" : "☰"}
            </button>
            <h1>CPACC Advanced Study Guide</h1>
            <span className="header-badge" aria-label="Advanced level, 100 questions">Advanced · 100 Qs</span>
            <button
              className="theme-btn"
              onClick={toggleTheme}
              aria-label={`Switch to ${theme === "dark" ? "light" : "dark"} mode`}
            >
              {theme === "dark" ? "☀ Light" : "☾ Dark"}
            </button>
          </header>

          {/* Mobile overlay */}
          <div
            className={`nav-overlay${navOpen ? " active" : ""}`}
            onClick={closeNav}
            aria-hidden="true"
          />

          <div className="layout">
            {/* Sidebar */}
            <nav
              id="sidebar-nav"
              className={`sidebar${navOpen ? " open" : ""}`}
              aria-label="Study guide sections"
            >
              <span className="nav-section-label">Contents</span>
              {NAV.map(item => (
                <a
                  key={item.id}
                  href={`#${item.id}`}
                  className={`${item.cls || "nav-link"}${activeSection === item.id ? " active" : ""}`}
                  aria-current={activeSection === item.id ? "location" : undefined}
                  onClick={closeNav}
                >
                  {item.label}
                </a>
              ))}
            </nav>

            {/* Main Content */}
            <main id="main-content" className="main-content" tabIndex="-1">

              {/* Cover */}
              <section id="cover" className="section-anchor cover" aria-labelledby="cover-title">
                <p className="cover-title" id="cover-title" aria-label="CPACC">CPACC</p>
                <p className="cover-sub">Advanced Exam Study Guide — Certified Professional in Accessibility Core Competencies</p>
                <div className="domain-cards" role="list" aria-label="Exam domains">
                  {[
                    ["d1","Domain I","Disabilities & AT · Q1–40"],
                    ["d2","Domain II","Accessibility & UD · Q41–80"],
                    ["d3","Domain III","Standards & Laws · Q81–100"],
                  ].map(([cls, title, sub]) => (
                    <div key={cls} className={`domain-card ${cls}`} role="listitem">
                      <div className="domain-card-title">{title}</div>
                      <div className="domain-card-sub">{sub}</div>
                    </div>
                  ))}
                </div>
                <p style={{color:"var(--text-muted)",fontSize:".9rem"}}>
                  Advanced Level &nbsp;·&nbsp; IAAP CPACC &nbsp;·&nbsp; Pass score: 70%
                </p>
              </section>

              {/* ── DOMAIN I ── */}
              <section id="d1" className="section-anchor" aria-labelledby="d1-heading">
                <div className="domain-header d1">
                  <span className="domain-badge">Domain I · Q1–40</span>
                  <h2 id="d1-heading">Domain I: Disabilities, Challenges &amp; Assistive Technologies</h2>
                  <p>Domain I comprises Questions 1–40. Advanced candidates must demonstrate deep understanding of disability theory, nuanced AT capabilities, specific functional limitations, and the interplay between impairments and access barriers.</p>
                </div>

                <SectionHeading id="s1-1">1.1 Theoretical Models of Disability</SectionHeading>
                <p className="section-intro">Advanced candidates must understand the philosophical underpinnings, strengths, and critiques of each model — and how each model shapes policy and design decisions.</p>
                <TermTable rows={D1_MODELS} domain="d1" />
                <TipBox label="Exam Tip">The ICF model (Biopsychosocial) from WHO is the internationally recognized standard. Know that UPIAS created the Social Model in 1975, and that the Social Model distinguishes <strong>'impairment' (individual)</strong> from <strong>'disability' (societal barrier)</strong>.</TipBox>

                <SectionHeading id="s1-2">1.2 Visual Disabilities &amp; Assistive Technologies</SectionHeading>
                <p className="section-intro">Visual disabilities range from total blindness to low vision, color deficiency, and photosensitivity. Each requires different AT solutions and design strategies.</p>
                <TermTable rows={D1_VISUAL} domain="d1" />

                <SectionHeading id="s1-3">1.3 Auditory Disabilities &amp; Assistive Technologies</SectionHeading>
                <p className="section-intro">Deafness and hard-of-hearing users rely on visual and tactile channels. Key requirements include captions, transcripts, and sign language interpretation.</p>
                <TermTable rows={D1_AUDITORY} domain="d1" />

                <SectionHeading id="s1-4">1.4 Motor &amp; Physical Disabilities &amp; AT</SectionHeading>
                <p className="section-intro">Motor disabilities affect the ability to use standard input devices. Solutions range from keyboard-only navigation to switch access, eye-tracking, and voice control.</p>
                <TermTable rows={D1_MOTOR} domain="d1" />

                <SectionHeading id="s1-5">1.5 Cognitive, Learning &amp; Neurological Disabilities</SectionHeading>
                <p className="section-intro">Cognitive disabilities are the broadest and most varied category. Advanced CPACC candidates must know the specific challenges and targeted design solutions.</p>
                <TermTable rows={D1_COGNITIVE} domain="d1" />
                <TipBox label="Exam Tip">Know the specific types of AT for each disability: screen readers (visual), captions/CART (auditory), switch access/eye-gaze (motor), text-to-speech/plain language (cognitive). Domain I questions often test which AT addresses a specific functional need.</TipBox>

                <SectionHeading id="s1-6">1.6 Speech, Language &amp; DeafBlind Disabilities</SectionHeading>
                <TermTable rows={D1_SPEECH} domain="d1" />
              </section>

              {/* ── DOMAIN II ── */}
              <section id="d2" className="section-anchor" aria-labelledby="d2-heading">
                <div className="domain-header d2">
                  <span className="domain-badge">Domain II · Q41–80</span>
                  <h2 id="d2-heading">Domain II: Accessibility &amp; Universal Design</h2>
                  <p>Domain II comprises Questions 41–80. Advanced coverage includes deep knowledge of WCAG 2.x success criteria, ARIA usage, UD principles, UDL, and ICT accessibility techniques.</p>
                </div>

                <SectionHeading id="s2-1">2.1 WCAG 2.x: Principles, Guidelines &amp; Conformance</SectionHeading>
                <p className="section-intro">Web Content Accessibility Guidelines (WCAG) are published by W3C WAI. WCAG 2.0 (2008), 2.1 (2018 — adds 17 new SCs), 2.2 (2023 — adds 9 new SCs, removes 4.1.1 Parsing). The four principles are Perceivable, Operable, Understandable, Robust (POUR).</p>
                <TermTable rows={D2_WCAG_OVERVIEW} domain="d2" />
                <TipBox label="Key Insight">WCAG 2.1 added SCs primarily for mobile/touch (2.5.x), cognitive (1.3.4, 1.3.5), and low vision (1.4.10–1.4.13). WCAG 2.2 added SCs for cognitive (3.3.7, 3.3.8) and focus visibility (2.4.11–2.4.13, 2.5.7–2.5.8). Know <strong>which version introduced each SC</strong>. The removal of SC 4.1.1 (Parsing) in WCAG 2.2 is frequently tested.</TipBox>

                <SectionHeading id="s2-2">2.2 Critical WCAG 2.x Success Criteria — Advanced Reference</SectionHeading>
                <p className="section-intro">The following table covers the most exam-critical SCs at the advanced level. Know the SC number, level, and key technical requirements.</p>
                <SCTable />

                <SectionHeading id="s2-3">2.3 WAI-ARIA: Roles, States &amp; Properties</SectionHeading>
                <p className="section-intro">WAI-ARIA (Accessible Rich Internet Applications) supplements HTML semantics for dynamic content and custom widgets. The first rule of ARIA: don't use ARIA if native HTML can do it.</p>
                <TermTable rows={D2_ARIA} domain="d2" />

                <SectionHeading id="s2-4">2.4 Universal Design (UD) and Universal Design for Learning (UDL)</SectionHeading>
                <p className="section-intro">Universal Design is the design of products and environments to be used by all people, to the greatest extent possible, without adaptation. Coined by Ron Mace at NC State. The 7 Principles apply to physical and digital environments.</p>
                <TermTable rows={D2_UD} domain="d2" />

                <SectionHeading id="s2-5">2.5 Advanced Web Accessibility Techniques</SectionHeading>
                <p className="section-intro">Beyond WCAG SC compliance, advanced practitioners understand the technical implementation details for web, PDF, and mobile content.</p>
                <TermTable rows={D2_TECHNIQUES} domain="d2" />
                <TipBox label="Exam Tip">Know the 7 UD Principles (Ron Mace), the 3 UDL Principles (CAST), and the POUR framework (WCAG). All functionality must be keyboard accessible. ARIA landmarks, live regions, and accessible name computation are frequently tested technical concepts.</TipBox>
              </section>

              {/* ── DOMAIN III ── */}
              <section id="d3" className="section-anchor" aria-labelledby="d3-heading">
                <div className="domain-header d3">
                  <span className="domain-badge">Domain III · Q81–100</span>
                  <h2 id="d3-heading">Domain III: Standards, Laws &amp; Accessibility Management</h2>
                  <p>Domain III comprises Questions 81–100. Advanced coverage includes deep knowledge of US and international laws, procurement standards, organizational management, and conformance methodologies.</p>
                </div>

                <SectionHeading id="s3-1">3.1 United States Accessibility Laws</SectionHeading>
                <p className="section-intro">Advanced candidates must know the specific requirements, enforcement bodies, and ICT standards associated with each US law.</p>
                <TermTable rows={D3_US_LAWS} domain="d3" />

                <SectionHeading id="s3-2">3.2 International Accessibility Laws &amp; Standards</SectionHeading>
                <TermTable rows={D3_INTL_LAWS} domain="d3" />
                <TipBox label="Exam Tip">Know: <strong>Section 508</strong> covers federal agencies (WCAG 2.0 AA). <strong>ADA Title III</strong> covers private businesses; courts apply WCAG 2.1 AA. <strong>EU Directive</strong> (public sector) and <strong>EU Accessibility Act</strong> (private sector) both reference EN 301 549 / WCAG 2.1 AA. <strong>CRPD</strong> is a human rights treaty, not directly enforceable ICT law.</TipBox>

                <SectionHeading id="s3-3">3.3 Key Standards, Frameworks &amp; Testing Methodologies</SectionHeading>
                <TermTable rows={D3_STANDARDS} domain="d3" />

                <SectionHeading id="s3-4">3.4 Organizational Accessibility Management</SectionHeading>
                <p className="section-intro">Advanced CPACC candidates understand how to build and sustain organizational accessibility programs.</p>
                <TermTable rows={D3_MANAGEMENT} domain="d3" />

                <SectionHeading id="s3-5">3.5 Quick Reference: Laws by Jurisdiction</SectionHeading>
                <div className="law-table-wrap" role="region" aria-label="Laws by jurisdiction reference table">
                  <table className="law-table">
                    <caption style={{padding:".5rem 1rem",textAlign:"left",fontSize:".8rem",color:"var(--text-muted)"}}>Global accessibility laws and their ICT standards</caption>
                    <thead>
                      <tr>
                        <th scope="col">Jurisdiction</th>
                        <th scope="col">Law / Standard</th>
                        <th scope="col">Scope</th>
                        <th scope="col">ICT Baseline</th>
                      </tr>
                    </thead>
                    <tbody>
                      {LAW_QUICK_REF.map(([j,law,scope,ict]) => (
                        <tr key={law}>
                          <td className="juris-col">{j}</td>
                          <td><strong>{law}</strong></td>
                          <td style={{color:"var(--text-muted)"}}>{scope}</td>
                          <td><span style={{fontFamily:"monospace",fontSize:".8rem",background:"var(--surface2)",padding:".1rem .4rem",borderRadius:"4px"}}>{ict}</span></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <TipBox label="Study Strategy">Domain III covers only 20 questions (20% of the exam). Prioritize knowing: (1) which law applies to which sector, (2) the specific ICT standard each law references, and (3) the enforcement body. Section 508 ≠ ADA; CRPD ≠ binding ICT law.</TipBox>
              </section>

              {/* Footer */}
              <footer style={{marginTop:"3rem",paddingTop:"1.5rem",borderTop:"1px solid var(--border)",color:"var(--text-muted)",fontSize:".85rem",textAlign:"center"}} role="contentinfo">
                <p>CPACC Advanced Study Guide &nbsp;·&nbsp; IAAP Certified Professional in Accessibility Core Competencies</p>
                <p style={{marginTop:".25rem"}}>Content aligned with IAAP CPACC Body of Knowledge. For exam information visit <a href="https://www.accessibilityassociation.org" rel="noopener noreferrer" target="_blank">accessibilityassociation.org</a>.</p>
              </footer>

            </main>
          </div>

          {/* Visually hidden SR-only utility style */}
          <style>{`.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}`}</style>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
